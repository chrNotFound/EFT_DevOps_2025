version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    ports:
      - "3306:3306"

  backjs:
    build: ./backJs
    ports:
      - "8081:8081"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: appuser
      DB_PASSWORD: apppassword
      DB_NAME: users_db
    depends_on:
      - mysql
    networks:
      - app-network

  backpy:
    build: ./BackPy
    ports:
      - "8082:8082"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: appuser
      DB_PASSWORD: apppassword
      DB_NAME: products_db
    depends_on:
      - mysql
    networks:
      - app-network

  frontend:
    build: ./Front
    ports:
      - "80:80"
    networks:
      - app-network

networks:
  app-network:

volumes:
  mysql-data:
