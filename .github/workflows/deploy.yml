name: CI/CD Pipeline - EFT DevOps

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Login a Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push Frontend
        run: |
          docker build -t chrnotfound/eft-frontend:${{ github.sha }} ./Front
          docker push chrnotfound/eft-frontend:${{ github.sha }}
          docker tag chrnotfound/eft-frontend:${{ github.sha }} chrnotfound/eft-frontend:latest
          docker push chrnotfound/eft-frontend:latest

      - name: Build y Push BackJS
        run: |
          docker build -t chrnotfound/eft-backjs:${{ github.sha }} ./backJs
          docker push chrnotfound/eft-backjs:${{ github.sha }}
          docker tag chrnotfound/eft-backjs:${{ github.sha }} chrnotfound/eft-backjs:latest
          docker push chrnotfound/eft-backjs:latest

      - name: Build y Push BackPy
        run: |
          docker build -t chrnotfound/eft-backpy:${{ github.sha }} ./BackPy
          docker push chrnotfound/eft-backpy:${{ github.sha }}
          docker tag chrnotfound/eft-backpy:${{ github.sha }} chrnotfound/eft-backpy:latest
          docker push chrnotfound/eft-backpy:latest