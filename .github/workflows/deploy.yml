name: CI/CD Pipeline - EFT DevOps

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build y Push Frontend
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/eft-frontend:${{ github.sha }} ./Front
          docker push ${{ steps.login-ecr.outputs.registry }}/eft-frontend:${{ github.sha }}

      - name: Build y Push BackJS
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/eft-backjs:${{ github.sha }} ./backJs
          docker push ${{ steps.login-ecr.outputs.registry }}/eft-backjs:${{ github.sha }}

      - name: Build y Push BackPy
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/eft-backpy:${{ github.sha }} ./BackPy
          docker push ${{ steps.login-ecr.outputs.registry }}/eft-backpy:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy a ECS
        run: |
          aws ecs update-service --cluster eft-cluster --service eft-frontend --force-new-deployment
          aws ecs update-service --cluster eft-cluster --service eft-backjs --force-new-deployment
          aws ecs update-service --cluster eft-cluster --service eft-backpy --force-new-deployment
          